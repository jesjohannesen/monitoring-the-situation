name: Post Morning Briefing
on:
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post briefing to ingest endpoint
        run: |
          RESPONSE=$(curl -sS -w '\nHTTP_STATUS:%{http_code}' -X POST https://monitoring-the-situation-one.vercel.app/api/briefing/ingest \
            -H 'content-type: application/json' \
            -H 'x-briefing-secret: 543a60110ab23bb900f10027dc58ea1d822bd1b15bf78b68f6737ec7bde7514d' \
            -d @.github/briefing-payload.json)
          echo "Server response:"
          echo "$RESPONSE"
          HTTP_CODE=$(echo "$RESPONSE" | grep 'HTTP_STATUS:' | sed 's/HTTP_STATUS://')
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Ingest failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Posted successfully"
