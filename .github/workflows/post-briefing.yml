name: Post Morning Briefing
on:
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post briefing to ingest endpoint
        run: |
          printf '%s' '' | base64 -d > /tmp/payload.json
          curl -sS -f -X POST https://monitoring-the-situation-one.vercel.app/api/briefing/ingest \
            -H 'content-type: application/json' \
            -H 'x-briefing-secret: 543a60110ab23bb900f10027dc58ea1d822bd1b15bf78b68f6737ec7bde7514d' \
            -d @/tmp/payload.json
          echo "Posted successfully"
