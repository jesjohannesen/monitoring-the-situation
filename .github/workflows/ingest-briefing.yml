name: Ingest daily briefing

on:
  workflow_dispatch:
    inputs:
      briefing_file:
        description: 'Path to briefing JSON file (relative to repo root)'
        required: true
        default: 'briefings/2026-07-17.json'
      secret_override:
        description: 'Override ingest secret (leave blank to use BRIEFING_INGEST_SECRET)'
        required: false
        default: ''

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: POST briefing to ingest endpoint
        env:
          BRIEFING_SECRET: ${{ secrets.BRIEFING_INGEST_SECRET }}
          SECRET_OVERRIDE: ${{ github.event.inputs.secret_override }}
        run: |
          # Use override if provided, otherwise use the repo secret
          EFFECTIVE_SECRET="${SECRET_OVERRIDE:-${BRIEFING_SECRET}}"

          RESPONSE=$(curl -sS -w '\n%{http_code}' -X POST \
            https://monitoring-the-situation-one.vercel.app/api/briefing/ingest \
            -H 'content-type: application/json' \
            -H "x-briefing-secret: ${EFFECTIVE_SECRET}" \
            -d @"${{ github.event.inputs.briefing_file }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Ingest failed with HTTP $HTTP_CODE"
            exit 1
          fi

          OK=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',''))")
          if [ "$OK" != "True" ] && [ "$OK" != "true" ]; then
            echo "::error::Ingest returned ok!=true: $BODY"
            exit 1
          fi

          echo "Briefing ingested successfully."
